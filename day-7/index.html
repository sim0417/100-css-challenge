<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../reset.scss" />
    <link rel="stylesheet" href="/styles/icons.css" />
    <link rel="stylesheet" href="style.scss" />
    <title>Day 7 of 100 days of code</title>
  </head>
  <body>
    <div class="frame">
      <div class="center">
        <div class="container">
          <div class="header">
            <div class="header-left">
              <input
                class="menu-toggle"
                type="checkbox"
                name="menu"
                id="menu"
              />
              <label for="menu">
                <div class="menu-icon">
                  <div class="menu-icon-line"></div>
                  <div class="menu-icon-line"></div>
                  <div class="menu-icon-circle"></div>
                </div>
              </label>
            </div>
            <div class="header-center">Notifications</div>
            <div class="header-right">
              <input
                class="search-toggle"
                type="checkbox"
                name="search"
                id="search-toggle"
              />
              <label class="search-label" for="search-toggle">
                <i class="icon icon-search"></i>
              </label>
            </div>
            <div class="header-search">
              <input
                class="search-input"
                id="search-input"
                type="text"
                placeholder="Search..."
              />
            </div>
          </div>
          <div class="contents">
            <ul class="content-items">
              <li class="content-item">
                <div class="conte-item-header">
                  <p>9:24 AM</p>
                </div>
                <div class="content-item-body">
                  <p>
                    <strong>John Walker</strong> posted a photo on your wall.
                  </p>
                </div>
              </li>
              <li class="content-item">
                <div class="conte-item-header">
                  <p>8:19 AM</p>
                </div>
                <div class="content-item-body">
                  <p><strong>Alice Parker</strong> commented your last post.</p>
                </div>
              </li>
              <li class="content-item">
                <div class="conte-item-header">
                  <p>Yesterday</p>
                </div>
                <div class="content-item-body">
                  <p><strong>Luke Wayne</strong> added you as friend.</p>
                </div>
              </li>
            </ul>
          </div>
        </div>
        <div class="side-menu">
          <ul>
            <li>
              <i class="icon icon-dashboard"></i>
              <span>Dashboard</span>
            </li>
            <li>
              <i class="icon icon-user"></i>
              <span>Profile</span>
            </li>
            <li>
              <i class="icon icon-bell"></i>
              <span>Notifications</span>
            </li>
            <li>
              <i class="icon icon-mail"></i>
              <span>Messages</span>
            </li>
            <li>
              <i class="icon icon-settings"></i>
              <span>Settings</span>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
