<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../reset.scss" />
    <link rel="stylesheet" href="style.scss" />
    <title>Day 5 of 100 days of code</title>
  </head>
  <body>
    <div class="frame">
      <div class="center">
        <div class="container">
          <div class="header">
            <div class="header-left">
              <p class="title">Weekly report</p>
              <p class="subtitle">01. Feb - 07. Feb</p>
            </div>
            <div class="header-right">
              <p class="title">Revenue</p>
              <p class="subtitle">$ 3621.79</p>
            </div>
          </div>
          <div class="chart">
            <div class="legend">
              <div class="legend-item views">
                <p>Views</p>
              </div>
              <div class="legend-item purchases">
                <p>Purchases</p>
              </div>
            </div>
            <div class="contents">
              <div class="horizontal-lines">
                <hr />
                <hr />
                <hr />
              </div>
              <div class="line line-views">
                <svg preserveAspectRatio="none">
                  <polyline
                    points="0,82 44,68 88,92 132,34 176,56 220,20 264,42"
                  />
                </svg>
                <div class="line-dots line-dots-views">
                  <div class="line-dot-1"></div>
                  <div class="line-dot-2"></div>
                  <div class="line-dot-3"></div>
                  <div class="line-dot-4"></div>
                  <div class="line-dot-5"></div>
                  <div class="line-dot-6"></div>
                  <div class="line-dot-7"></div>
                </div>
              </div>
              <div class="line line-purchases">
                <svg preserveAspectRatio="none">
                  <polyline
                    points="0,92 44,80 88,96 132,70 176,80 220,58 264,66"
                  />
                </svg>
                <div class="line-dots line-dots-purchases">
                  <div class="line-dot-1"></div>
                  <div class="line-dot-2"></div>
                  <div class="line-dot-3"></div>
                  <div class="line-dot-4"></div>
                  <div class="line-dot-5"></div>
                  <div class="line-dot-6"></div>
                  <div class="line-dot-7"></div>
                </div>
              </div>
            </div>
            <div class="horizontal-labels">
              <p>MON</p>
              <p>TUE</p>
              <p>WED</p>
              <p>THU</p>
              <p>FRI</p>
              <p>SAT</p>
              <p>SUN</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
